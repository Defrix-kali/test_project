<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Продавец</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="notificationContainer" style="position: fixed; top: 10px; right: 10px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; max-width: 400px;"></div>
  <header>
    <h1>🌼 Панель продавца</h1>
    <nav>
      <a href="/index.html">Главная</a>
      <a href="/login.html">Вход</a>
      <a href="#" id="logoutBtn" style="cursor:pointer;color:#f93b1d">Выход</a>
    </nav>
  </header>
  <main>
    <section id="login" style="display:none">
      <h2>Вход продавца</h2>
      <form id="sellerLogin">
        <label>Логин <input name="login"></label>
        <label>Пароль <input name="password" type="password"></label>
        <button type="submit">Войти</button>
      </form>
    </section>

    <section id="sellerPanel" style="display:none">
      <h2>Мои цветы</h2>
      <form id="addFlower">
        <input name="name" placeholder="Название" required>
        <input name="description" placeholder="Описание" required>
        <input name="price" placeholder="Цена" required type="number" step="0.01">
        <label>Фото цветка <input name="imageFile" type="file" accept="image/*"></label>
        <label>Тип
          <select name="type">
            <option value="bouquet">Готовый букет</option>
            <option value="single">Штучный цветок</option>
            <option value="paper">Бумага / оформление</option>
          </select>
        </label>
        <input name="stock" placeholder="Шт./наличие (для штучных)" type="number" min="0">
        <input type="hidden" name="editId">
        <button type="submit">Добавить / Сохранить</button>
        <button type="button" id="cancelEdit" style="display:none">Отменить</button>
      </form>
      <ul id="myFlowers" style="list-style:none;padding:0"></ul>

      <h3>Заказы</h3>
      <ul id="myOrders"></ul>
    </section>
  </main>
  <script src="/script.js?v=2.0"></script>
</body>
</html>
